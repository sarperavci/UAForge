name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Seed JSON data from latest release
        run: |
          mkdir -p uaforge/data
          URL="https://github.com/sarperavci/UAForge/releases/latest/download/browser-data.tar.gz"
          wget -q "$URL" -O /tmp/d.tar.gz && tar xzf /tmp/d.tar.gz -C uaforge/data/
          ls uaforge/data/

      - name: Install package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Smoke import + filtered generate
        run: |
          python -c "
          import sys; print('python:', sys.version.split()[0])
          from uaforge.core.generator import UserAgentGenerator
          g = UserAgentGenerator(seed=42)
          print('chrome+desktop:', g.generate(families='chrome', device_types='desktop').user_agent)
          "

      - name: Run filter test suite
        run: python -m pytest tests/test_filters.py -q
